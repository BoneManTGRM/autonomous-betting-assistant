name: Report Studio Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/report_studio.py'
      - 'autonomous_betting_agent/**'
      - 'scripts/**'
      - '.github/workflows/report_studio_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Compile files
        run: python -m py_compile pages/report_studio.py autonomous_betting_agent/report_studio_service.py autonomous_betting_agent/report_feed_service.py autonomous_betting_agent/report_export_service.py autonomous_betting_agent/report_image_export_service.py autonomous_betting_agent/report_background_image_service.py autonomous_betting_agent/report_magazine_pdf_service.py autonomous_betting_agent/pdf_report.py scripts/report_product_layer_smoke_test.py scripts/learning_layer_smoke_test.py scripts/report_services_smoke_test.py scripts/report_studio_service_smoke_test.py scripts/report_image_export_smoke_test.py scripts/report_background_export_smoke_test.py scripts/report_magazine_pdf_smoke_test.py scripts/report_studio_regression_check.py scripts/report_studio_browser_smoke.py scripts/wait_for_streamlit_port.py
      - name: Product layer smoke test
        run: python -m scripts.report_product_layer_smoke_test
      - name: Learning layer smoke test
        run: python -m scripts.learning_layer_smoke_test
      - name: Report services smoke test
        run: python -m scripts.report_services_smoke_test
      - name: Report Studio service smoke test
        run: python -m scripts.report_studio_service_smoke_test
      - name: Image export smoke test
        run: python -m scripts.report_image_export_smoke_test
      - name: Custom background PNG smoke test
        run: |
          set -o pipefail
          mkdir -p diagnostics
          python -m scripts.report_background_export_smoke_test 2>&1 | tee diagnostics/report_background_export_smoke_test.log
      - name: Magazine PDF smoke test
        run: python -m scripts.report_magazine_pdf_smoke_test
      - name: Report Studio regression check
        run: |
          set -o pipefail
          mkdir -p diagnostics
          python -m scripts.report_studio_regression_check 2>&1 | tee diagnostics/report_studio_regression_check.log
      - name: Upload regression diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-studio-regression-diagnostics
          path: diagnostics/
          if-no-files-found: ignore
      - name: Full validation aggregate
        run: python -m scripts.report_studio_full_validation
      - name: Start Streamlit
        run: streamlit run app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &
      - name: Wait for local app
        run: python scripts/wait_for_streamlit_port.py 127.0.0.1 8501 90
      - name: Browser smoke
        run: python scripts/report_studio_browser_smoke.py
      - name: Print Streamlit log on failure
        if: failure()
        run: cat streamlit.log || true
