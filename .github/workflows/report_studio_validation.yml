name: Report Studio Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/report_studio.py'
      - 'autonomous_betting_agent/**'
      - 'scripts/**'
      - '.github/workflows/report_studio_validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium
      - name: Compile files
        run: python -m py_compile pages/report_studio.py autonomous_betting_agent/report_studio_service.py autonomous_betting_agent/report_feed_service.py autonomous_betting_agent/report_export_service.py autonomous_betting_agent/report_image_export_service.py autonomous_betting_agent/pdf_report.py scripts/report_image_export_smoke_test.py scripts/report_studio_browser_smoke.py scripts/wait_for_streamlit_port.py
      - name: Run Report Studio validation
        run: python -m scripts.report_studio_full_validation
      - name: Start Streamlit
        run: streamlit run app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &
      - name: Wait for local app
        run: python scripts/wait_for_streamlit_port.py 127.0.0.1 8501 90
      - name: Browser smoke
        run: python scripts/report_studio_browser_smoke.py
      - name: Print Streamlit log on failure
        if: failure()
        run: cat streamlit.log || true
