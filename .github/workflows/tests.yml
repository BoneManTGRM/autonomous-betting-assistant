name: tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Python 3.11 pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile Python files
        run: |
          python -m compileall -q streamlit_app.py app_streamlit.py autonomous_betting_agent pages tests scripts

      - name: Run pytest
        run: |
          python -m pytest -q tests --disable-warnings --import-mode=importlib
