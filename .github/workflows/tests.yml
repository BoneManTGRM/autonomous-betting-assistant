name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unittest:
    name: Python ${{ matrix.python-version }} unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee unit-test-${{ matrix.python-version }}.log

      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log-${{ matrix.python-version }}
          path: unit-test-${{ matrix.python-version }}.log
