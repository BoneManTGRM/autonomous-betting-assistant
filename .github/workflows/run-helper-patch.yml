name: Run Helper Patch

on:
  push:
    paths:
      - '.github/workflows/run-helper-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply helper patch
        run: python .github/scripts/patch_helper.py
      - name: Commit helper patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add autonomous_betting_agent/magazine_book_export.py
          git diff --cached --quiet && exit 0
          git commit -m "Fix magazine helper"
          git push
