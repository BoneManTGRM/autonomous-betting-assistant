name: Apply Pro Predictor Defaults

# Manual-only safety check. This workflow must not write commits on push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-defaults:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Pro Predictor defaults
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('pages/pro_predictor.py').read_text(encoding='utf-8')
          required = [
              "APP_VERSION = 'pro-predictor-v17-score-volume-250'",
              "'min_edge': -0.03,",
              "'min_strength': 38.0,",
              "'max_high_conf': 250,",
              "'min_high_prob': 0.60,",
              "'min_high_edge': -0.03,",
              "'min_high_strength': 40.0,",
              "'min_high_agent': 40.0,",
              "default=['us', 'us2', 'eu', 'uk']",
              "value=50, step=1)",
              "value=500, step=25)",
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('Missing expected Pro Predictor defaults: ' + repr(missing))
          print('Pro Predictor defaults verified.')
          PY
