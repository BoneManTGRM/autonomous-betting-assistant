name: Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas streamlit requests

      - name: Compile Python files
        run: python -m compileall autonomous_betting_agent pages tests

      - name: Run unit tests if present
        run: |
          if [ -d tests ]; then python -m unittest discover -s tests -v; fi
