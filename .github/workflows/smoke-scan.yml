name: Smoke Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke scan
        run: python scripts/smoke_scan.py
