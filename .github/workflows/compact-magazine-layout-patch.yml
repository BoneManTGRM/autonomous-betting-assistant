name: One-time compact magazine layout patch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Patch compact readable reference layout
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('autonomous_betting_agent/magazine_book_export.py')
          text = p.read_text(encoding='utf-8')
          text = text.replace('MAGAZINE_STYLE_VERSION = "premium_v4_reference_readable"', 'MAGAZINE_STYLE_VERSION = "premium_v4_reference_compact"')
          text = text.replace('background_opacity: float = 0.65', 'background_opacity: float = 0.9')
          text = text.replace('int(255 * min(max(opacity, 0.55), 0.75))', 'int(255 * min(max(opacity, 0.82), 0.95))')
          text = text.replace('font=_fit(away.upper(), 600, 98, 56, True)', 'font=_fit(away.upper(), 600, 116, 56, True)')
          text = text.replace('font=_fit(home.upper(), 560, 78, 46, True)', 'font=_fit(home.upper(), 560, 94, 46, True)')
          text = text.replace('for _ in range(260):', 'for _ in range(130):')
          text = text.replace('for _ in range(30):', 'for _ in range(12):')
          text = text.replace('draw.text((328, 35), "DAILY SPORTS ANALYSIS", font=_font(31, True), fill="white")', 'draw.text((328, 32), "DAILY SPORTS ANALYSIS", font=_font(34, True), fill="white")')
          old = '''def _section(draw: ImageDraw.ImageDraw, x: int, y: int, w: int, h: int, title: str, color: tuple[int, int, int], icon: str = "★") -> None:
    draw.rounded_rectangle((x, y, x + w, y + h), radius=14, fill=CREAM + (252,), outline=BLACK + (235,), width=3)
    draw.rounded_rectangle((x, y, x + w, y + 54), radius=10, fill=color)
    draw.text((x + 18, y + 12), icon, font=_font(24, True), fill=CREAM)
    header_font = _fit(title.upper(), w - 66, 27, 18, True)
    draw.text((x + 54, y + 11), title.upper(), font=header_font, fill=CREAM)
'''
          new = '''def _section(draw: ImageDraw.ImageDraw, x: int, y: int, w: int, h: int, title: str, color: tuple[int, int, int], icon: str = "*") -> None:
    draw.rounded_rectangle((x, y, x + w, y + h), radius=14, fill=CREAM + (252,), outline=BLACK + (235,), width=3)
    draw.rounded_rectangle((x, y, x + w, y + 56), radius=10, fill=color)
    title_x = x + 54 if icon else x + 18
    if icon:
        draw.text((x + 18, y + 13), icon, font=_font(24, True), fill=CREAM)
    header_font = _fit(title.upper(), w - (title_x - x) - 14, 31, 20, True)
    draw.text((title_x, y + 10), title.upper(), font=header_font, fill=CREAM)
'''
          if old not in text:
              raise SystemExit('Could not find _section block to patch')
          text = text.replace(old, new)
          text = text.replace(', "★")', ', "*")')
          text = text.replace(', "●")', ', "*")')
          text = text.replace(', "♟")', ', "")')
          text = text.replace(', "♢")', ', "")')
          text = text.replace(', "↗")', ', "")')
          if 'TEAM_DATA_FALLBACK = "Data not available from uploaded row"' not in text:
              raise SystemExit('Missing TEAM_DATA_FALLBACK contract token')
          if 'PLAYER_DATA_FALLBACK = "Player data not available in uploaded row"' not in text:
              raise SystemExit('Missing PLAYER_DATA_FALLBACK contract token')
          if 'premium_v4_reference_compact' not in text:
              raise SystemExit('Version patch failed')
          p.write_text(text, encoding='utf-8')
          Path('.github/workflows/compact-magazine-layout-patch.yml').unlink()
          PY
      - name: Validate
        run: |
          python -m py_compile autonomous_betting_agent/magazine_book_export.py pages/report_studio.py
          python -m pip install -q pandas pillow streamlit reportlab requests python-dateutil
          python -m scripts.report_studio_regression_check
      - name: Commit compact layout patch
        run: |
          if git diff --quiet; then
            echo "No patch needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add autonomous_betting_agent/magazine_book_export.py .github/workflows/compact-magazine-layout-patch.yml
          git commit -m "Tighten magazine layout to match reference sheet"
          git push
