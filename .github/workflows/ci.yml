name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python compile and pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Show environment
        run: |
          python --version
          python -m pip --version
          python -m pip list

      - name: Compile source
        run: |
          python -m compileall autonomous_betting_agent pages tests streamlit_app.py app_streamlit.py

      - name: Run pytest
        run: |
          python -m pytest -q tests
