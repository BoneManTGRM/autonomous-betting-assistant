name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python compile and pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile source
        run: |
          python -m compileall streamlit_app.py app_streamlit.py autonomous_betting_agent pages tests

      - name: Run pytest
        run: |
          python -m pytest -q tests > pytest.log 2>&1

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-pytest-log
          path: pytest.log
