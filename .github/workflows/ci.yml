name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests and syntax checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}
      PIP_DISABLE_PIP_VERSION_CHECK: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Show environment
        run: |
          python --version
          python -m pip --version
          pwd
          find . -maxdepth 2 -type f | sort | sed 's#^./##' | head -200

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; else python -m pip install pytest; fi

      - name: Compile Python files
        run: |
          python -m compileall autonomous_betting_agent pages tests

      - name: Run unit tests
        run: |
          python -m pytest tests -q --maxfail=1
