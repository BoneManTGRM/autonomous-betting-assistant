name: Sale Readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  magazine-report-gate:
    name: Magazine and report gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      PYTHONUNBUFFERED: '1'
      STREAMLIT_SERVER_HEADLESS: 'true'
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile critical magazine files
        run: python -m py_compile autonomous_betting_agent/magazine_api_sources.py autonomous_betting_agent/magazine_live_api_enrichment.py pages/report_studio.py

      - name: Magazine API display regression
        run: python -m pytest -q tests/test_magazine_api_sources_display.py

      - name: Report Studio regression check
        run: python -m scripts.report_studio_regression_check

      - name: Magazine autofit stress test
        run: python scripts/magazine_autofit_stress_test.py

      - name: Full test suite
        run: python -m pytest -q
