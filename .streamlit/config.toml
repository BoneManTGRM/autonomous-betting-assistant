# deploy trigger: public-proof-centralized-sidebar-v16
[server]
headless = true

[browser]
gatherUsageStats = false

[client]
# Hide Streamlit's automatic file-list sidebar. Pages render the shared ABA sidebar.
showSidebarNavigation = false
# Keep the Streamlit toolbar visible so the app menu/reboot controls remain available.
toolbarMode = "auto"
